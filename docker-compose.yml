# jaycebordelon.com self-contained stack. Owns its own Traefik, its
# own letsencrypt cert volume, and its own bridge network. Drop-in
# deployable on any droplet that has docker + ports 80/443 open
# (intentional: planned move to a separate droplet from vibetradez).
#
# Two services:
#   - traefik: TLS termination + Host() routing (canonical apex +
#     www + the legacy jayceb.com permanent redirect)
#   - jaycebordelon-com: nginx serving static HTML built from src/.
#     Build step compiles markdown posts + Tailwind into dist/; final
#     image is nginx:alpine with no Node runtime.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  traefik:
    image: traefik:v2.10
    container_name: jaycebordelon-traefik
    logging: *default-logging
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=bordelonjayce@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "jaycebordelon_letsencrypt:/letsencrypt"
    networks:
      - jaycebordelon-network
    restart: unless-stopped

  jaycebordelon-com:
    image: jaycebordelon.com:latest
    build:
      context: .
    expose:
      - "3000"
    networks:
      - jaycebordelon-network
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "app=jaycebordelon.com"
      - "traefik.enable=true"
      # Canonical apex + www
      - "traefik.http.routers.jaycebordelon.rule=Host(`jaycebordelon.com`) || Host(`www.jaycebordelon.com`)"
      - "traefik.http.routers.jaycebordelon.entrypoints=websecure"
      - "traefik.http.routers.jaycebordelon.tls.certresolver=letsencrypt"
      - "traefik.http.routers.jaycebordelon.priority=10"
      - "traefik.http.services.jaycebordelon.loadbalancer.server.port=3000"
      # Legacy jayceb.com → jaycebordelon.com (permanent redirect)
      - "traefik.http.routers.jayceb-redirect.rule=Host(`jayceb.com`) || Host(`www.jayceb.com`)"
      - "traefik.http.routers.jayceb-redirect.entrypoints=websecure"
      - "traefik.http.routers.jayceb-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.jayceb-redirect.priority=5"
      - "traefik.http.routers.jayceb-redirect.middlewares=redirect-to-jaycebordelon"
      - "traefik.http.middlewares.redirect-to-jaycebordelon.redirectregex.regex=^https://(www\\.)?jaycebordelon\\.com(.*)"
      - "traefik.http.middlewares.redirect-to-jaycebordelon.redirectregex.replacement=https://jaycebordelon.com$${2}"
      - "traefik.http.middlewares.redirect-to-jaycebordelon.redirectregex.permanent=true"

volumes:
  jaycebordelon_letsencrypt:

networks:
  jaycebordelon-network:
    driver: bridge
