# nginx config for the static site. Three behaviors worth knowing:
#
# 1. Pretty URLs without trailing slashes: a request to /blog tries
#    /blog/index.html. A request to /blog/posts/foo tries
#    /blog/posts/foo.html. The `try_files` chain handles both.
#
# 2. Cache headers split by file type. The HTML is short-lived (so
#    new deploys propagate fast); static assets (images, css, js)
#    get a long cache + immutable since their content addresses don't
#    rotate without a deploy.
#
# 3. /healthz is a tiny endpoint the deploy + uptime checks use.
#    Returns 200 OK with body "ok". No file system touch.

server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Don't gzip pre-compressed types; let nginx gzip HTML/CSS/JS.
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types text/plain text/css text/xml application/javascript application/json application/xml+rss image/svg+xml;

  # Tiny liveness endpoint for the deploy + docker compose healthcheck.
  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # HTML pages: try /<path>.html, then /<path>/index.html, then 404.
  # Resolves /blog → /blog/index.html and /blog/posts/foo → /blog/posts/foo.html
  # without needing redirects.
  location / {
    try_files $uri $uri.html $uri/index.html =404;
    # HTML can change on every deploy; short cache so visitors see new
    # builds promptly while a long-running TCP connection still
    # benefits from local cache.
    add_header Cache-Control "public, max-age=60, must-revalidate";
  }

  # Long-lived static assets. Content changes mean a new path (because
  # of how the build emits images / fonts under hashed names if added
  # later), so we can hand out aggressive caches without worry.
  location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # Surface the sitemap + robots without forcing the .txt extension.
  location = /robots.txt { add_header Content-Type text/plain; }
  location = /sitemap.xml { add_header Content-Type application/xml; }

  # Custom 404 page would go here if we cared; default nginx 404 is
  # fine for now.
}
