<!doctype html>
<html lang="en" class="{{ htmlClass }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>{{ title }}</title>
    <meta name="description" content="{{ description }}" />
    <link rel="canonical" href="{{ canonical }}" />
    <link rel="icon" href="/favicon.ico" />

    <meta property="og:type" content="{{ ogType }}" />
    <meta property="og:title" content="{{ ogTitle }}" />
    <meta property="og:description" content="{{ description }}" />
    <meta property="og:url" content="{{ canonical }}" />
    <meta property="og:site_name" content="Jayce Bordelon" />
    <meta property="og:image" content="{{ ogImage }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ ogTitle }}" />
    <meta name="twitter:description" content="{{ description }}" />
    <meta name="twitter:image" content="{{ ogImage }}" />
    <meta name="twitter:creator" content="@JayceBordelon" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/styles.css" />

    <!-- Choose dark/light synchronously so we don't flash the wrong theme.
         Reads localStorage('theme') first, then system preference. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var mode = stored || (prefersDark ? "dark" : "light");
          if (mode === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <script type="application/ld+json">
      {{ jsonLd }}
    </script>
  </head>
  <body class="{{ bodyClass }}">
    {{ header }}
    <main>{{ content }}</main>
    {{ background }}
    <script src="/scripts/theme.js" defer></script>
    {{ pageScripts }}
  </body>
</html>
