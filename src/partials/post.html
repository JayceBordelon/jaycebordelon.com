<article class="container mx-auto max-w-4xl px-4 py-16 lg:px-16">
  <header class="mb-12 space-y-6">
    <div>
      <span class="inline-flex items-center rounded-md bg-secondary px-2.5 py-0.5 text-sm font-semibold text-secondary-foreground">{{ label }}</span>
    </div>

    <h1 class="font-serif text-5xl font-bold leading-tight tracking-tight text-foreground md:text-6xl">{{ title }}</h1>

    <p class="text-xl leading-relaxed text-muted-foreground">{{ summary }}</p>

    <div class="flex flex-wrap items-center gap-4 border-t border-border pt-4">
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary text-sm font-semibold text-primary-foreground">{{ authorInitials }}</div>
        <div class="flex flex-col">
          <span class="text-sm font-semibold text-foreground">{{ author }}</span>
          <span class="text-xs text-muted-foreground">{{ authorDesc }}</span>
        </div>
      </div>

      <span class="text-muted-foreground">&bull;</span>

      <div class="flex items-center gap-1.5 text-sm text-muted-foreground">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <path d="M16 2v4" />
          <path d="M8 2v4" />
          <path d="M3 10h18" />
        </svg>
        <time datetime="{{ published }}">{{ publishedFormatted }}</time>
      </div>

      {{ readTimeBlock }}
    </div>

    {{ tagBlock }}
  </header>

  <div class="prose prose-lg max-w-none dark:prose-invert">
    {{ content }}
  </div>

  <footer class="mt-16 border-t border-border pt-8">
    <a href="/blog" class="inline-flex items-center gap-2 font-medium text-primary underline-offset-4 hover:underline">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="m12 19-7-7 7-7" />
        <path d="M19 12H5" />
      </svg>
      Back to all posts
    </a>
  </footer>
</article>
